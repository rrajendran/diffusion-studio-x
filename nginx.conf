server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy local AI providers so the browser never needs to hit host ports directly.
    # The React app can call /api/ollama/... and it will be forwarded to the container.
    location /api/ollama/ {
        proxy_pass http://ollama:11434/;
        proxy_set_header Host $host;
    }
}
